<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Grid Street-View 360 Explorer</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.css"
    />
    <style>
      :root {
        --bg: #060910;
        --panel: rgba(19, 24, 36, 0.72);
        --panel-border: rgba(255, 255, 255, 0.14);
        --muted: #9ca9c7;
        --text: #f7f9ff;
        --accent: #89b4ff;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", "Segoe UI", Arial, sans-serif;
        color: var(--text);
        background:
          radial-gradient(circle at 20% 0%, rgba(95, 143, 255, 0.24), transparent 45%),
          radial-gradient(circle at 90% 10%, rgba(131, 84, 255, 0.24), transparent 42%),
          var(--bg);
      }
      .app-shell { max-width: 1320px; margin: 0 auto; padding: 22px; }
      .topbar { margin-bottom: 14px; }
      .topbar h1 { margin: 0; font-size: clamp(24px, 3vw, 34px); letter-spacing: -0.03em; }
      .topbar p { margin: 8px 0 0; color: var(--muted); }
      .layout { display: grid; grid-template-columns: minmax(320px, 410px) 1fr; gap: 18px; }
      .card {
        background: var(--panel);
        border: 1px solid var(--panel-border);
        border-radius: 24px;
        backdrop-filter: blur(16px);
        box-shadow: 0 30px 70px rgba(0, 0, 0, 0.33);
      }
      .sidebar { padding: 16px; display: grid; gap: 14px; align-content: start; }
      .section-title {
        margin: 0 0 8px;
        font-size: 14px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: #bfcae6;
      }
      textarea {
        width: 100%;
        min-height: 108px;
        resize: vertical;
        border: 1px solid rgba(255, 255, 255, 0.18);
        border-radius: 18px;
        background: rgba(7, 12, 24, 0.67);
        color: var(--text);
        padding: 12px 14px;
        line-height: 1.4;
      }
      textarea:focus-visible, button:focus-visible, .history-item:focus-visible {
        outline: 2px solid var(--accent);
        outline-offset: 2px;
      }
      .button-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
      button {
        border: 0;
        border-radius: 16px;
        cursor: pointer;
        padding: 11px 14px;
        font-weight: 650;
        color: var(--text);
        background: linear-gradient(180deg, #85b0ff, #598dff);
        transition: transform 120ms ease, box-shadow 120ms ease, opacity 120ms ease;
      }
      button:hover:not(:disabled) { transform: translateY(-1px); box-shadow: 0 10px 24px rgba(89, 141, 255, 0.42); }
      button:disabled { opacity: 0.58; cursor: not-allowed; }
      .secondary { background: rgba(255, 255, 255, 0.09); border: 1px solid rgba(255, 255, 255, 0.18); }
      #status {
        border-radius: 16px;
        padding: 10px 12px;
        color: #d3ddf8;
        background: rgba(255, 255, 255, 0.05);
        border: 1px solid rgba(255, 255, 255, 0.12);
        font-size: 14px;
      }
      .history-head { display: flex; align-items: center; justify-content: space-between; gap: 8px; }
      #historyList { display: grid; gap: 10px; max-height: 52vh; overflow: auto; padding-right: 4px; }
      .history-item {
        width: 100%;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(9, 15, 28, 0.72);
        border-radius: 18px;
        color: var(--text);
        text-align: left;
        padding: 10px;
      }
      .history-item.active { border-color: #9ac0ff; background: rgba(33, 56, 105, 0.62); }
      .history-item .meta { margin-top: 6px; display: flex; gap: 12px; color: #adc0ea; font-size: 12px; }
      .history-thumb {
        width: 100%;
        aspect-ratio: 2 / 1;
        object-fit: cover;
        border-radius: 12px;
        margin-bottom: 8px;
        border: 1px solid rgba(255, 255, 255, 0.12);
      }
      .viewer-panel { padding: 14px; display: grid; gap: 10px; }
      .panorama-wrap { position: relative; }
      #panorama {
        width: 100%;
        height: 72vh;
        border-radius: 22px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.14);
        background: #0a0d15;
      }
      .dpad {
        position: absolute;
        left: 50%;
        bottom: 20px;
        transform: translateX(-50%);
        z-index: 12;
        display: grid;
        grid-template-columns: repeat(3, 56px);
        grid-template-rows: repeat(3, 56px);
        gap: 8px;
        padding: 10px;
        border-radius: 22px;
        background: rgba(5, 10, 20, 0.55);
        border: 1px solid rgba(255, 255, 255, 0.16);
        backdrop-filter: blur(8px);
      }
      .dpad button {
        padding: 0;
        border-radius: 999px;
        font-size: 23px;
        font-weight: 700;
        color: #0d1322;
        background: linear-gradient(180deg, #f4f8ff, #d6e4ff);
      }
      #moveNorth { grid-column: 2; grid-row: 1; }
      #moveWest { grid-column: 1; grid-row: 2; }
      #moveEast { grid-column: 3; grid-row: 2; }
      #moveSouth { grid-column: 2; grid-row: 3; }
      #hud { display: flex; flex-wrap: wrap; gap: 10px; }
      #hud > div {
        padding: 8px 12px;
        border-radius: 999px;
        color: #cad7f5;
        border: 1px solid rgba(255, 255, 255, 0.16);
        background: rgba(255, 255, 255, 0.06);
        font-size: 13px;
      }
      .placeholder {
        border-radius: 14px;
        padding: 14px;
        color: #c1cfee;
        background: rgba(255, 255, 255, 0.04);
        border: 1px dashed rgba(255, 255, 255, 0.2);
      }
      @media (max-width: 1000px) {
        .layout { grid-template-columns: 1fr; }
        #panorama { height: 58vh; }
      }
    </style>
  </head>
  <body>
    <div class="app-shell">
      <div class="topbar">
        <h1>Grid Street-View 360 Explorer</h1>
        <p>Generate a world or reopen one from cache and continue exploring instantly.</p>
      </div>
      <div class="layout">
        <aside class="card sidebar">
          <section>
            <h2 class="section-title">World Prompt</h2>
            <textarea id="prompt">{{ default_prompt }}</textarea>
            <div class="button-row">
              <button id="startWorld">Start World</button>
              <button id="reloadNode" class="secondary">Reload Node</button>
            </div>
          </section>
          <div id="status">Ready.</div>
          <section>
            <div class="history-head">
              <h2 class="section-title">World History</h2>
              <button id="refreshHistory" class="secondary">Refresh</button>
            </div>
            <div id="historyList"></div>
          </section>
        </aside>
        <main class="card viewer-panel">
          <div class="panorama-wrap">
            <div id="panorama"></div>
            <div class="dpad">
              <button id="moveNorth" title="Move North">↑</button>
              <button id="moveWest" title="Move West">←</button>
              <button id="moveEast" title="Move East">→</button>
              <button id="moveSouth" title="Move South">↓</button>
            </div>
          </div>
          <div id="hud">
            <div id="worldId">World: -</div>
            <div id="coord">Coord: (0, 0)</div>
            <div id="cache">Cache: -</div>
          </div>
        </main>
      </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/pannellum@2.5.6/build/pannellum.js"></script>
    <script>
      const promptInput = document.getElementById("prompt");
      const startWorldButton = document.getElementById("startWorld");
      const reloadNodeButton = document.getElementById("reloadNode");
      const refreshHistoryButton = document.getElementById("refreshHistory");
      const statusText = document.getElementById("status");
      const historyList = document.getElementById("historyList");
      const worldIdText = document.getElementById("worldId");
      const coordText = document.getElementById("coord");
      const cacheText = document.getElementById("cache");
      const moveNorthButton = document.getElementById("moveNorth");
      const moveSouthButton = document.getElementById("moveSouth");
      const moveEastButton = document.getElementById("moveEast");
      const moveWestButton = document.getElementById("moveWest");

      let viewer = null;
      let worldState = { worldId: null, x: 0, y: 0 };
      let historyState = { loading: false, error: "", worlds: [] };

      function setMoveButtonsDisabled(disabled) {
        moveNorthButton.disabled = disabled;
        moveSouthButton.disabled = disabled;
        moveEastButton.disabled = disabled;
        moveWestButton.disabled = disabled;
      }
      function setActionButtonsDisabled(disabled) {
        startWorldButton.disabled = disabled;
        reloadNodeButton.disabled = disabled;
        refreshHistoryButton.disabled = disabled;
      }
      function escapeHtml(value) {
        return String(value)
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;")
          .replaceAll("'", "&#39;");
      }
      function formatCreatedAt(value) {
        if (!value) return "unknown time";
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return "unknown time";
        return date.toLocaleString();
      }
      function renderHistory() {
        if (historyState.loading) {
          historyList.innerHTML = '<div class="placeholder">Loading cached worlds...</div>';
          return;
        }
        if (historyState.error) {
          historyList.innerHTML = `<div class="placeholder">Failed to load history: ${escapeHtml(historyState.error)}</div>`;
          return;
        }
        if (!historyState.worlds.length) {
          historyList.innerHTML = '<div class="placeholder">No cached worlds yet. Start your first world.</div>';
          return;
        }

        historyList.innerHTML = historyState.worlds
          .map((world) => {
            const thumb = world.origin_image_url
              ? `<img class="history-thumb" src="${world.origin_image_url}" alt="world preview" loading="lazy" />`
              : "";
            const activeClass = world.world_id === worldState.worldId ? "active" : "";
            return `
              <button class="history-item ${activeClass}" data-world-id="${world.world_id}" data-prompt="${escapeHtml(world.prompt || "")}">
                ${thumb}
                <strong>${escapeHtml(world.prompt_preview || "Untitled world")}</strong>
                <div class="meta">
                  <span>${escapeHtml(formatCreatedAt(world.created_at))}</span>
                  <span>${world.node_count || 0} nodes</span>
                </div>
              </button>
            `;
          })
          .join("");

        historyList.querySelectorAll(".history-item").forEach((button) => {
          button.addEventListener("click", () => {
            openWorld(button.dataset.worldId, button.dataset.prompt || "");
          });
        });
      }
      function showPanorama(payload) {
        const { imageUrl, x, y, worldId, cacheHit } = payload;
        if (viewer) viewer.destroy();
        viewer = pannellum.viewer("panorama", {
          type: "equirectangular",
          panorama: imageUrl,
          autoLoad: true,
          showZoomCtrl: true,
          showFullscreenCtrl: true,
          pitch: 0,
          yaw: 0,
          hfov: 100
        });
        worldState.worldId = worldId;
        worldState.x = x;
        worldState.y = y;
        worldIdText.textContent = `World: ${worldId}`;
        coordText.textContent = `Coord: (${x}, ${y})`;
        cacheText.textContent = `Cache: ${cacheHit ? "hit" : "miss"}`;
        renderHistory();
      }
      async function loadHistory() {
        historyState.loading = true;
        historyState.error = "";
        renderHistory();
        try {
          const response = await fetch("/world/history");
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "History request failed.");
          historyState.worlds = Array.isArray(data.worlds) ? data.worlds : [];
        } catch (error) {
          historyState.error = error.message;
        } finally {
          historyState.loading = false;
          renderHistory();
        }
      }
      async function openWorld(worldId, worldPrompt) {
        if (!worldId) return;
        setActionButtonsDisabled(true);
        setMoveButtonsDisabled(true);
        statusText.textContent = "Opening cached world...";
        try {
          const query = new URLSearchParams({ world_id: worldId, x: "0", y: "0" });
          const response = await fetch(`/world/node?${query.toString()}`);
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "Failed to open world.");
          showPanorama(data);
          if (worldPrompt) promptInput.value = worldPrompt;
          statusText.textContent = "World loaded. Use arrows to explore.";
        } catch (error) {
          statusText.textContent = `Error: ${error.message}`;
        } finally {
          setActionButtonsDisabled(false);
          setMoveButtonsDisabled(!worldState.worldId);
        }
      }
      async function startWorld() {
        setActionButtonsDisabled(true);
        setMoveButtonsDisabled(true);
        statusText.textContent = "Starting world and loading origin node...";
        try {
          const response = await fetch("/world/start", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ prompt: promptInput.value })
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "Failed to start world.");
          showPanorama(data);
          statusText.textContent = "World ready. Drag and move to explore.";
          await loadHistory();
        } catch (error) {
          statusText.textContent = `Error: ${error.message}`;
        } finally {
          setActionButtonsDisabled(false);
          setMoveButtonsDisabled(!worldState.worldId);
        }
      }
      async function move(direction) {
        if (!worldState.worldId) {
          statusText.textContent = "Start or open a world first.";
          return;
        }
        setMoveButtonsDisabled(true);
        statusText.textContent = `Moving ${direction}...`;
        try {
          const response = await fetch("/world/move", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              world_id: worldState.worldId,
              x: worldState.x,
              y: worldState.y,
              direction
            })
          });
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "Move failed.");
          showPanorama(data);
          statusText.textContent = `Moved ${direction}. Drag to inspect this location.`;
        } catch (error) {
          statusText.textContent = `Error: ${error.message}`;
        } finally {
          setMoveButtonsDisabled(false);
        }
      }
      async function reloadCurrentNode() {
        if (!worldState.worldId) {
          statusText.textContent = "Start or open a world first.";
          return;
        }
        setActionButtonsDisabled(true);
        setMoveButtonsDisabled(true);
        statusText.textContent = "Reloading current node...";
        try {
          const query = new URLSearchParams({
            world_id: worldState.worldId,
            x: String(worldState.x),
            y: String(worldState.y)
          });
          const response = await fetch(`/world/node?${query.toString()}`);
          const data = await response.json();
          if (!response.ok) throw new Error(data.error || "Reload failed.");
          showPanorama(data);
          statusText.textContent = "Reload complete.";
        } catch (error) {
          statusText.textContent = `Error: ${error.message}`;
        } finally {
          setActionButtonsDisabled(false);
          setMoveButtonsDisabled(!worldState.worldId);
        }
      }
      startWorldButton.addEventListener("click", startWorld);
      reloadNodeButton.addEventListener("click", reloadCurrentNode);
      refreshHistoryButton.addEventListener("click", loadHistory);
      moveNorthButton.addEventListener("click", () => move("north"));
      moveSouthButton.addEventListener("click", () => move("south"));
      moveEastButton.addEventListener("click", () => move("east"));
      moveWestButton.addEventListener("click", () => move("west"));
      setActionButtonsDisabled(false);
      setMoveButtonsDisabled(true);
      loadHistory();
    </script>
  </body>
</html>
